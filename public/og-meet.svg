<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="ttl">Book a time with Shannon — social preview card</title>
  <desc id="desc">A dark card with a July calendar date tile on the left and booking copy on the right.</desc>

  <!-- background -->
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="16" y="16" width="1168" height="598" rx="24" fill="none" stroke="#14b8a6" stroke-opacity="0.35" stroke-width="2"/>

  <!-- calendar date tile -->
  <g>
    <rect x="112" y="182" width="286" height="286" rx="30" fill="#ffffff"/>
    <path d="M112 212 a30 30 0 0 1 30 -30 h226 a30 30 0 0 1 30 30 v46 h-286 z" fill="#14b8a6"/>
    <text x="255" y="243" text-anchor="middle" font-size="26" font-weight="700" letter-spacing="6" fill="#ffffff">JULY</text>
    <rect x="176" y="166" width="14" height="40" rx="7" fill="#0f172a"/>
    <rect x="320" y="166" width="14" height="40" rx="7" fill="#0f172a"/>
    <text x="255" y="392" text-anchor="middle" font-size="140" font-weight="800" fill="#0f172a">15</text>
    <text x="255" y="440" text-anchor="middle" font-size="24" font-weight="600" letter-spacing="4" fill="#64748b">THURSDAY</text>
  </g>

  <!-- right column copy -->
  <text x="452" y="228" font-size="22" font-weight="700" letter-spacing="5" fill="#2dd4bf">SCHEDULE A MEETING</text>
  <text x="450" y="300" font-size="62" font-weight="800" fill="#f8fafc">Book a time with</text>
  <text x="450" y="372" font-size="62" font-weight="800" fill="#f8fafc">Shannon</text>
  <text x="452" y="424" font-size="27" font-weight="400" fill="#94a3b8">Chat with Swift to find a slot — you'll get</text>
  <text x="452" y="460" font-size="27" font-weight="400" fill="#94a3b8">a calendar invite by email.</text>

  <!-- CTA pill -->
  <rect x="452" y="496" width="250" height="58" rx="29" fill="#14b8a6"/>
  <text x="577" y="533" text-anchor="middle" font-size="24" font-weight="700" fill="#04201c">Pick a time  →</text>

  <!-- footer -->
  <text x="112" y="556" font-size="20" font-weight="500" fill="#64748b">flock-of-agents.tailoredu.ai</text>
  <text x="1088" y="556" text-anchor="end" font-size="20" font-weight="500" fill="#64748b">Powered by Swift · TailoredU LLC</text>
</svg>
